<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>つたえるボード（1択）</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      padding: 10px;
      box-sizing: border-box;
      background: #f5f5f5;
    }

    .main-btn {
      font-size: 56px;
      border: 3px solid black;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: white;
      width: 100%;
      height: 100%;
      padding: 10px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .main-btn img {
      width: 85%;
      height: 70%;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .label {
      font-size: 56px;
      line-height: 1.2;
      word-break: break-word;
      text-align: center;
    }

    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>

  <button id="mainBtn" class="main-btn" onclick="press(this)" ondblclick="editButton(this, 'uploadMain', 'main')">
    <img src="water.jpg" alt="みず">
    <span class="label">みず</span>
  </button>

  <input type="file" id="uploadMain" accept="image/*">

  <script>
    let ignoreNextClick = false;

    function press(button) {
      if (ignoreNextClick) {
        ignoreNextClick = false;
        return;
      }

      button.style.background = "lightgreen";

      const label = button.querySelector(".label");
      const text = label ? label.textContent.trim() : "";

      if (text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "ja-JP";
        speechSynthesis.cancel();
        speechSynthesis.speak(msg);
      }

      setTimeout(() => {
        button.style.background = "white";
      }, 800);
    }

    function editButton(button, inputId, keyName) {
      ignoreNextClick = true;

      const choice = prompt(
        "編集する内容を入力してください:\n1 = ことばを変える\n2 = しゃしんを変える",
        "1"
      );

      if (choice === "1") {
        changeLabel(button, keyName);
      } else if (choice === "2") {
        openUpload(inputId);
      }
    }

    function changeLabel(button, keyName) {
      const label = button.querySelector(".label");
      if (!label) return;

      const currentText = label.textContent.trim();
      const newText = prompt("あたらしい ことばを いれてください", currentText);

      if (newText && newText.trim() !== "") {
        const cleanedText = newText.trim();
        label.textContent = cleanedText;

        const img = button.querySelector("img");
        if (img) {
          img.alt = cleanedText;
        }

        localStorage.setItem("label_" + keyName, cleanedText);
      }
    }

    function openUpload(inputId) {
      const input = document.getElementById(inputId);
      if (input) {
        input.click();
      }
    }

    function setupUpload(inputId, imgSelector, keyName) {
      const input = document.getElementById(inputId);

      input.addEventListener("change", function (event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = function (e) {
          const img = document.querySelector(imgSelector);
          if (img) {
            img.src = e.target.result;
            localStorage.setItem("image_" + keyName, e.target.result);
          }
        };

        reader.readAsDataURL(file);
        input.value = "";
      });
    }

    function loadSavedData() {
      const savedLabel = localStorage.getItem("label_main");
      const savedImage = localStorage.getItem("image_main");

      const button = document.querySelector("#mainBtn");
      const label = button.querySelector(".label");
      const img = button.querySelector("img");

      if (savedLabel) {
        label.textContent = savedLabel;
        img.alt = savedLabel;
      }

      if (savedImage) {
        img.src = savedImage;
      }
    }

    setupUpload("uploadMain", "#mainBtn img", "main");
    loadSavedData();
  </script>

</body>
</html>
