<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>つたえるボード（2択）</title>

  <style>
    body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      margin: 0;
      gap: 10px;
      padding: 10px;
      background: #f5f5f5;
    }

    .main-btn {
      font-size: 48px;
      border: 3px solid black;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: white;
      width: 100%;
      height: 100%;
    }

    .main-btn img {
      width: 90%;
      height: 70%;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .label {
      font-size: 48px;
    }

    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>

  <button id="waterBtn" class="main-btn" onclick="press(this)" ondblclick="editButton(this, 'uploadWater', 'water')">
    <img src="water.jpg">
    <span class="label">みず</span>
  </button>

  <button id="toyBtn" class="main-btn" onclick="press(this)" ondblclick="editButton(this, 'uploadToy', 'toy')">
    <img src="toy.jpg">
    <span class="label">おもちゃ</span>
  </button>

  <input type="file" id="uploadWater" accept="image/*">
  <input type="file" id="uploadToy" accept="image/*">

  <script>
    let ignoreNextClick = false;

    function press(button) {
      if (ignoreNextClick) {
        ignoreNextClick = false;
        return;
      }

      button.style.background = "lightgreen";

      const text = button.querySelector(".label").textContent;

      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = "ja-JP";
      speechSynthesis.cancel();
      speechSynthesis.speak(msg);

      setTimeout(() => {
        button.style.background = "white";
      }, 800);
    }

    function editButton(button, inputId, keyName) {
      ignoreNextClick = true;

      const choice = prompt("1=ことば 2=しゃしん", "1");

      if (choice === "1") {
        const label = button.querySelector(".label");
        const newText = prompt("ことばをいれる", label.textContent);

        if (newText) {
          label.textContent = newText;
          localStorage.setItem("label_" + keyName, newText);
        }
      } else if (choice === "2") {
        document.getElementById(inputId).click();
      }
    }

    function setupUpload(inputId, imgSelector, keyName) {
      const input = document.getElementById(inputId);

      input.addEventListener("change", function (event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = function (e) {
          const img = document.querySelector(imgSelector);
          img.src = e.target.result;
          localStorage.setItem("image_" + keyName, e.target.result);
        };

        reader.readAsDataURL(file);
      });
    }

    function loadSavedData() {
      ["water","toy"].forEach(key => {
        const label = localStorage.getItem("label_" + key);
        const img = localStorage.getItem("image_" + key);

        if (label) document.querySelector(`#${key}Btn .label`).textContent = label;
        if (img) document.querySelector(`#${key}Btn img`).src = img;
      });
    }

    setupUpload("uploadWater", "#waterBtn img", "water");
    setupUpload("uploadToy", "#toyBtn img", "toy");

    loadSavedData();
  </script>

</body>
</html>
