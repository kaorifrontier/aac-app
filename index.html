<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>つたえるボード</title>

  <style>
    body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      height: 100vh;
      margin: 0;
      gap: 10px;
      padding: 10px;
      box-sizing: border-box;
      background: #f5f5f5;
    }

    .main-btn {
      font-size: 40px;
      border: 3px solid black;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: white;
      width: 100%;
      height: 100%;
      padding: 10px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .main-btn img {
      width: 80%;
      height: 60%;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .label {
      font-size: 40px;
      line-height: 1.2;
      word-break: break-word;
      text-align: center;
    }

    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>

  <button id="waterBtn" class="main-btn" onclick="press(this)" ondblclick="editButton(this, 'uploadWater')">
    <img src="water.jpg" alt="みず">
    <span class="label">みず</span>
  </button>

  <button id="toyBtn" class="main-btn" onclick="press(this)" ondblclick="editButton(this, 'uploadToy')">
    <img src="toy.jpg" alt="おもちゃ">
    <span class="label">おもちゃ</span>
  </button>

  <button id="ytBtn" class="main-btn" onclick="press(this)" ondblclick="editButton(this, 'uploadYT')">
    <img src="youtube.jpg" alt="ゆーちゅーぶ">
    <span class="label">ゆーちゅーぶ</span>
  </button>

  <button id="endBtn" class="main-btn" onclick="press(this)" ondblclick="editTextOnly(this)">
    <span class="label">おわり</span>
  </button>

  <input type="file" id="uploadWater" accept="image/*">
  <input type="file" id="uploadToy" accept="image/*">
  <input type="file" id="uploadYT" accept="image/*">

  <script>
    let ignoreNextClick = false;

    function press(button) {
      if (ignoreNextClick) {
        ignoreNextClick = false;
        return;
      }

      button.style.background = "lightgreen";

      const label = button.querySelector(".label");
      const text = label ? label.textContent.trim() : "";

      if (text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "ja-JP";
        speechSynthesis.cancel();
        speechSynthesis.speak(msg);
      }

      setTimeout(() => {
        button.style.background = "white";
      }, 800);
    }

    function editButton(button, inputId) {
      ignoreNextClick = true;

      const choice = prompt(
        "編集する内容を入力してください:\n1 = ことばを変える\n2 = しゃしんを変える",
        "1"
      );

      if (choice === "1") {
        changeLabel(button);
      } else if (choice === "2") {
        openUpload(inputId);
      }
    }

    function editTextOnly(button) {
      ignoreNextClick = true;
      changeLabel(button);
    }

    function changeLabel(button) {
      const label = button.querySelector(".label");
      if (!label) return;

      const currentText = label.textContent.trim();
      const newText = prompt("あたらしい ことばを いれてください", currentText);

      if (newText && newText.trim() !== "") {
        label.textContent = newText.trim();

        const img = button.querySelector("img");
        if (img) {
          img.alt = newText.trim();
        }
      }
    }

    function openUpload(inputId) {
      const input = document.getElementById(inputId);
      if (input) {
        input.click();
      }
    }

    function setupUpload(inputId, imgSelector) {
      const input = document.getElementById(inputId);

      input.addEventListener("change", function (event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = function (e) {
          const img = document.querySelector(imgSelector);
          if (img) {
            img.src = e.target.result;
          }
        };

        reader.readAsDataURL(file);
        input.value = "";
      });
    }

    setupUpload("uploadWater", "#waterBtn img");
    setupUpload("uploadToy", "#toyBtn img");
    setupUpload("uploadYT", "#ytBtn img");
  </script>

</body>
</html>
