<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>つたえるボード</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: sans-serif;
    }

    .wrap {
      width: 100%;
      max-width: 700px;
      padding: 20px;
      box-sizing: border-box;
      display: grid;
      gap: 16px;
    }

    h1 {
      text-align: center;
      font-size: 36px;
      margin: 0 0 12px 0;
    }

    a {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 110px;
      border: 3px solid black;
      border-radius: 18px;
      background: white;
      text-decoration: none;
      color: black;
      font-size: 34px;
      font-weight: bold;
    }

    a:active {
      background: lightgreen;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>つたえるボード</h1>
    <a href="one.html">1たく</a>
    <a href="two.html">2たく</a>
    <a href="four.html">4たく</a>
  </div>
</body>
</html>
