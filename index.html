<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>つたえるボード</title>

  <style>
    body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      height: 100vh;
      margin: 0;
      gap: 10px;
      padding: 10px;
      box-sizing: border-box;
      background: #f5f5f5;
    }

    button {
      font-size: 40px;
      border: 3px solid black;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: white;
      width: 100%;
      height: 100%;
      padding: 10px;
      box-sizing: border-box;
    }

    img {
      width: 80%;
      height: 60%;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>

  <button id="waterBtn" ondblclick="openUpload('uploadWater')" onclick="press(this,'みず')">
    <img src="water.jpg" alt="みず">
    みず
  </button>

  <button id="toyBtn" ondblclick="openUpload('uploadToy')" onclick="press(this,'おもちゃ')">
    <img src="toy.jpg" alt="おもちゃ">
    おもちゃ
  </button>

  <button id="ytBtn" ondblclick="openUpload('uploadYT')" onclick="press(this,'ゆーちゅーぶ')">
    <img src="youtube.jpg" alt="ゆーちゅーぶ">
    ゆーちゅーぶ
  </button>

  <button id="endBtn" onclick="press(this,'おわり')">
    おわり
  </button>

  <input type="file" id="uploadWater" accept="image/*">
  <input type="file" id="uploadToy" accept="image/*">
  <input type="file" id="uploadYT" accept="image/*">

  <script>
    function press(button, text) {
      button.style.background = "lightgreen";

      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = "ja-JP";
      speechSynthesis.cancel();
      speechSynthesis.speak(msg);

      setTimeout(() => {
        button.style.background = "white";
      }, 800);
    }

    function openUpload(inputId) {
      document.getElementById(inputId).click();
    }

    function setupUpload(inputId, imgSelector) {
      const input = document.getElementById(inputId);

      input.addEventListener("change", function (event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = function (e) {
          const img = document.querySelector(imgSelector);
          img.src = e.target.result;
        };

        reader.readAsDataURL(file);

        // 同じ画像をもう一回選べるようにする
        input.value = "";
      });
    }

    setupUpload("uploadWater", "#waterBtn img");
    setupUpload("uploadToy", "#toyBtn img");
    setupUpload("uploadYT", "#ytBtn img");
  </script>

</body>
</html>
